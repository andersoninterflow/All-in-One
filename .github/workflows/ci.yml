name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: python scripts/scaffold_modules.py --check
      - run: python scripts/validate_repository.py
      - run: python scripts/validate_openapi.py
      - name: Generated artifacts gate
        shell: pwsh
        run: ./scripts/check_generated_artifacts.ps1
      - run: python -m compileall -q modules scripts platform_test_support.py
      - run: python -m pytest --import-mode=importlib
      - run: docker build --file modules/identity/Dockerfile --tag all-in-one/identity:ci .
