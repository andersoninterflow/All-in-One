apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: crm
  name: crm
spec:
  replicas: 2
  selector:
    matchLabels:
      app: crm
  template:
    metadata:
      labels:
        app: crm
    spec:
      containers:
      - env:
        - name: ALL_IN_ONE_STORAGE_DIR
          value: /data
        - name: ALL_IN_ONE_CRM_POSTGRES_DSN
          value: ${ALL_IN_ONE_CRM_POSTGRES_DSN:-postgresql://all_in_one:local-development-only@postgres:5432/all_in_one}
        image: gcr.io/all-in-one-498012/crm:latest
        name: crm
        ports:
        - containerPort: 8000
