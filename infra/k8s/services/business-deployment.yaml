apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: business
  name: business
spec:
  replicas: 2
  selector:
    matchLabels:
      app: business
  template:
    metadata:
      labels:
        app: business
    spec:
      containers:
      - env:
        - name: ALL_IN_ONE_STORAGE_DIR
          value: /data
        - name: ALL_IN_ONE_BUSINESS_POSTGRES_DSN
          value: ${ALL_IN_ONE_BUSINESS_POSTGRES_DSN:-postgresql://all_in_one:local-development-only@postgres:5432/all_in_one}
        image: gcr.io/all-in-one-498012/business:latest
        name: business
        ports:
        - containerPort: 8000
