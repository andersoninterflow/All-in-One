openapi: 3.1.0
info:
  title: All-in-One API Hub API
  version: 0.2.0
servers:
  - url: /api/v1/api_hub
security:
  - bearerAuth: []
paths:
  /health:
    get:
      security: []
      responses:
        '200':
          description: Healthy
  /version:
    get:
      security: []
      responses:
        '200':
          description: Version information
  /status:
    get:
      responses:
        '200':
          description: Operational status
  /metrics:
    get:
      responses:
        '200':
          description: Prometheus metrics
  /create:
    post:
      parameters:
        - $ref: '#/components/parameters/ActorUserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePayload'
      responses:
        '201':
          description: Resource created
  /list:
    get:
      responses:
        '200':
          description: Resource collection
  /{id}:
    get:
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Resource detail
    patch:
      parameters:
        - $ref: '#/components/parameters/ResourceId'
        - $ref: '#/components/parameters/ActorUserId'
      responses:
        '200':
          description: Resource updated
    delete:
      parameters:
        - $ref: '#/components/parameters/ResourceId'
        - $ref: '#/components/parameters/ActorUserId'
      responses:
        '204':
          description: Resource soft-deleted
  /approve:
    post:
      parameters:
        - $ref: '#/components/parameters/ActorUserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DecisionPayload'
      responses:
        '200':
          description: Resource approved
  /reject:
    post:
      parameters:
        - $ref: '#/components/parameters/ActorUserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DecisionPayload'
      responses:
        '200':
          description: Resource rejected
  /audit:
    post:
      parameters:
        - $ref: '#/components/parameters/ActorUserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuditPayload'
      responses:
        '201':
          description: Audit evidence accepted
  /catalog:
    get:
      responses:
        '200':
          description: Contracted domain resources
  /resources/{resource_type}:
    post:
      responses:
        '201':
          description: Domain resource created
    get:
      responses:
        '200':
          description: Authorized domain resource collection
  /resources/{resource_type}/{resource_id}:
    get:
      responses:
        '200':
          description: Authorized domain resource
    patch:
      responses:
        '200':
          description: Domain resource updated
    delete:
      responses:
        '204':
          description: Domain resource soft-deleted
  /resources/{resource_type}/{resource_id}/actions/{action}:
    post:
      responses:
        '200':
          description: Workflow transition recorded
  /audit/events:
    get:
      responses:
        '200':
          description: Immutable audit evidence
  /events/outbox:
    get:
      responses:
        '200':
          description: Transactional outbox domain events
  /gateway/status:
    get:
      security: []
      responses:
        '200':
          description: Gateway operational status
  /gateway/catalog/offers:
    get:
      security: []
      responses:
        '200':
          description: Catalogo Valley agregado e filtrado
  /gateway/consumer/orders:
    get:
      responses:
        '200':
          description: Historico normalizado do consumidor autenticado
  /gateway/consumer/orders/{order_id}/reviews:
    post:
      parameters:
        - name: order_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConsumerReviewRequest'
      responses:
        '201':
          description: Avaliacao publicada para pedido concluido
        '403':
          description: Pedido pertence a outro consumidor
        '409':
          description: Pedido ainda nao foi concluido
  /gateway/consumer/orders/{order_id}/support:
    post:
      parameters:
        - name: order_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SupportCaseRequest'
      responses:
        '201':
          description: Caso de suporte ou disputa registrado
        '403':
          description: Pedido pertence a outro consumidor
        '409':
          description: Pedido ainda nao permite suporte
  /gateway/insights/commercial:
    get:
      responses:
        '200':
          description: Resumo comercial para CRM e BI
  /gateway/api-key/check:
    get:
      security: []
      parameters:
        - name: X-API-Key
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: API key accepted by edge gateway
        '401':
          description: API key missing or invalid
        '403':
          description: API key scope denied
  /gateway/webhooks/verify:
    post:
      security: []
      parameters:
        - name: X-All-In-One-Signature
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Webhook signature accepted
        '401':
          description: Webhook signature invalid
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    ResourceId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ActorUserId:
      name: X-Actor-User-Id
      in: header
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    CreatePayload:
      type: object
      required: [user_id]
      properties:
        user_id:
          type: string
          format: uuid
        entity_id:
          type: string
          format: uuid
        status:
          type: string
        payload:
          type: object
          additionalProperties: true
    DecisionPayload:
      type: object
      required: [id, reason]
      properties:
        id:
          type: string
          format: uuid
        reason:
          type: string
          minLength: 3
    AuditPayload:
      type: object
      required: [action, resource_type, resource_id]
      properties:
        action:
          type: string
        resource_type:
          type: string
        resource_id:
          type: string
          format: uuid
        payload:
          type: object
          additionalProperties: true
    ConsumerReviewRequest:
      type: object
      required: [rating, idempotency_key]
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type:
            - string
            - 'null'
          maxLength: 1000
        idempotency_key:
          type: string
          minLength: 8
          maxLength: 120
    SupportCaseRequest:
      type: object
      required: [kind, message, idempotency_key]
      properties:
        kind:
          type: string
          enum: [support, dispute]
        subject:
          type: string
          maxLength: 200
        message:
          type: string
          minLength: 5
          maxLength: 1000
        desired_resolution:
          type: string
          maxLength: 500
        idempotency_key:
          type: string
          minLength: 8
          maxLength: 120
