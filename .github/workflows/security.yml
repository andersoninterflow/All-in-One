name: Security

on:
  push:
  pull_request:
  schedule:
    - cron: "17 4 * * 1"

jobs:
  python-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip==26.1.1
      - run: pip install -r requirements-dev.txt pip-audit bandit
      - run: pip-audit --local
      - run: bandit -r modules/shared scripts -q
