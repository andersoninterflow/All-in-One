name: Refresh Generated Contracts

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/scaffold_modules.py
      - name: Commit generated changes
        run: |
          git config user.name "all-in-one-bot"
          git config user.email "actions@users.noreply.github.com"
          git add apps modules contracts
          git diff --cached --quiet || git commit -m "refresh generated module contracts"
          git push
