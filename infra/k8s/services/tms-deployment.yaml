apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: tms
  name: tms
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tms
  template:
    metadata:
      labels:
        app: tms
    spec:
      containers:
      - env:
        - name: ALL_IN_ONE_STORAGE_DIR
          value: /data
        - name: ALL_IN_ONE_TMS_POSTGRES_DSN
          value: ${ALL_IN_ONE_TMS_POSTGRES_DSN:-postgresql://all_in_one:local-development-only@postgres:5432/all_in_one}
        image: gcr.io/all-in-one-498012/tms:latest
        name: tms
        ports:
        - containerPort: 8000
