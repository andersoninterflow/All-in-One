name: OpenRouter Cost Audit

on:
    schedule:
        - cron: "0 12 * * *" # Executa todo dia as 12:00 UTC
    workflow_dispatch: # Permite execucao manual para testes

jobs:
    audit-cost:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: Install dependencies
              run: pip install requests

            - name: Run OpenRouter Validation
              env:
                  OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
              run: python scripts/validate_openrouter.py
