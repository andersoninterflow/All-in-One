name: Docker Compose Health Gate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  compose-health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and start services
        run: docker compose -f infra/docker/docker-compose.yml up --build -d

      - name: Wait for services to be healthy
        run: |
          echo "Aguardando serviços essenciais iniciarem..."
          # O healthcheck nativo do docker-compose cuidará da orquestração real, aqui damos fôlego ao runner.
          sleep 30

      - name: Stop services
        if: always()
        run: docker compose -f infra/docker/docker-compose.yml down -v