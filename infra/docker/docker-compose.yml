name: all-in-one

x-module-common: &module-common
  build:
    context: ../..
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy
    rabbitmq:
      condition: service_healthy
  networks: [platform]
  environment:
    ALL_IN_ONE_STORAGE_DIR: /data
  volumes:
    - domain-data:/data

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-all_in_one}
      POSTGRES_USER: ${POSTGRES_USER:-all_in_one}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local-development-only}
    ports: ["5432:5432"]
    volumes: [postgres-data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks: [platform]

  migrations:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-local-development-only}
    volumes:
      - ../../database/postgres/migrations:/migrations:ro
    command:
      - sh
      - -ec
      - |
        for file in /migrations/*.sql; do
          psql -h postgres -U "${POSTGRES_USER:-all_in_one}" -d "${POSTGRES_DB:-all_in_one}" -v ON_ERROR_STOP=1 -f "$$file"
        done
    networks: [platform]

  mongodb:
    image: mongo:7
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-all_in_one}
    ports: ["27017:27017"]
    volumes:
      - mongodb-data:/data/db
      - ../../database/mongodb/init:/docker-entrypoint-initdb.d:ro
    networks: [platform]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    networks: [platform]

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-all_in_one}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-local-development-only}
    ports: ["5672:5672", "15672:15672"]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks: [platform]

  api-hub:
    <<: *module-common
    build:
      context: ../..
      dockerfile: modules/api_hub/Dockerfile
    ports: ["8100:8000"]

  identity:
    <<: *module-common
    build:
      context: ../..
      dockerfile: modules/identity/Dockerfile
    ports: ["8101:8000"]

  finance:
    <<: *module-common
    build:
      context: ../..
      dockerfile: modules/finance/Dockerfile
    ports: ["8102:8000"]

  marketplace:
    <<: *module-common
    build:
      context: ../..
      dockerfile: modules/marketplace/Dockerfile
    ports: ["8103:8000"]

  delivery:
    <<: *module-common
    build:
      context: ../..
      dockerfile: modules/delivery/Dockerfile
    ports: ["8104:8000"]

  services:
    <<: *module-common
    build:
      context: ../..
      dockerfile: modules/services/Dockerfile
    ports: ["8105:8000"]

  mobility:
    <<: *module-common
    build:
      context: ../..
      dockerfile: modules/mobility/Dockerfile
    ports: ["8106:8000"]

  erp:
    <<: *module-common
    build:
      context: ../..
      dockerfile: modules/erp/Dockerfile
    ports: ["8107:8000"]

  wms:
    <<: *module-common
    build:
      context: ../..
      dockerfile: modules/wms/Dockerfile
    ports: ["8108:8000"]

  tms:
    <<: *module-common
    build:
      context: ../..
      dockerfile: modules/tms/Dockerfile
    ports: ["8109:8000"]

  crm:
    <<: *module-common
    build:
      context: ../..
      dockerfile: modules/crm/Dockerfile
    ports: ["8110:8000"]

  health:
    <<: *module-common
    build:
      context: ../..
      dockerfile: modules/health/Dockerfile
    ports: ["8111:8000"]

  jobs:
    <<: *module-common
    build:
      context: ../..
      dockerfile: modules/jobs/Dockerfile
    environment:
      ALL_IN_ONE_STORAGE_DIR: /data
      ALL_IN_ONE_PRIVATE_DOCUMENT_DIR: /private-documents
      ALL_IN_ONE_DOCUMENT_ENCRYPTION_KEY: ${ALL_IN_ONE_DOCUMENT_ENCRYPTION_KEY:-}
      ALL_IN_ONE_JOBS_POSTGRES_DSN: ${ALL_IN_ONE_JOBS_POSTGRES_DSN:-}
    volumes:
      - domain-data:/data
      - private-document-data:/private-documents
    ports: ["8112:8000"]

volumes:
  postgres-data:
  mongodb-data:
  domain-data:
  private-document-data:

networks:
  platform:
