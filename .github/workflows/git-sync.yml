name: Git Sync

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  git-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate main branch sync
        shell: pwsh
        run: ./scripts/check_git_sync.ps1 -Branch main -Remotes origin -AllowDirty
