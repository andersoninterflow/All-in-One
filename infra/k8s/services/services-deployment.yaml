apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: services
  name: services
spec:
  replicas: 2
  selector:
    matchLabels:
      app: services
  template:
    metadata:
      labels:
        app: services
    spec:
      containers:
      - env:
        - name: ALL_IN_ONE_STORAGE_DIR
          value: /data
        - name: ALL_IN_ONE_SERVICES_POSTGRES_DSN
          value: ${ALL_IN_ONE_SERVICES_POSTGRES_DSN:-postgresql://all_in_one:local-development-only@postgres:5432/all_in_one}
        image: gcr.io/all-in-one-498012/services:latest
        name: services
        ports:
        - containerPort: 8000
