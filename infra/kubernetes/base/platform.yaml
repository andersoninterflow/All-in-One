apiVersion: v1
kind: Namespace
metadata:
  name: all-in-one
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-config
  namespace: all-in-one
data:
  EVENT_BUS: rabbitmq
  LOG_LEVEL: info
  ALL_IN_ONE_OUTBOX_EXCHANGE: all-in-one.domain
  ALL_IN_ONE_OUTBOX_BATCH_SIZE: "100"
  ALL_IN_ONE_OUTBOX_POLL_SECONDS: "1"
  ALL_IN_ONE_RETENTION_BATCH_SIZE: "100"
---
apiVersion: v1
kind: Secret
metadata:
  name: platform-secrets-placeholder
  namespace: all-in-one
type: Opaque
stringData:
  DATABASE_URL: REPLACE_WITH_VAULT_REFERENCE
  JWT_SIGNING_KEY: REPLACE_WITH_VAULT_REFERENCE
  ALL_IN_ONE_OUTBOX_POSTGRES_DSN: REPLACE_WITH_VAULT_REFERENCE
  ALL_IN_ONE_RABBITMQ_URL: REPLACE_WITH_VAULT_REFERENCE
  ALL_IN_ONE_RETENTION_POSTGRES_DSN: REPLACE_WITH_VAULT_REFERENCE
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity
  namespace: all-in-one
spec:
  replicas: 2
  selector:
    matchLabels: {app: identity}
  template:
    metadata:
      labels: {app: identity}
    spec:
      containers:
        - name: identity
          image: all-in-one/identity:0.1.0
          ports: [{containerPort: 8000}]
          readinessProbe: {httpGet: {path: /health, port: 8000}}
          envFrom:
            - configMapRef: {name: platform-config}
            - secretRef: {name: platform-secrets-placeholder}
---
apiVersion: v1
kind: Service
metadata:
  name: identity
  namespace: all-in-one
spec:
  selector: {app: identity}
  ports: [{port: 80, targetPort: 8000}]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-hub
  namespace: all-in-one
spec:
  replicas: 2
  selector:
    matchLabels: {app: api-hub}
  template:
    metadata:
      labels: {app: api-hub}
    spec:
      containers:
        - name: api-hub
          image: all-in-one/api-hub:0.1.0
          ports: [{containerPort: 8000}]
          readinessProbe: {httpGet: {path: /health, port: 8000}}
          envFrom:
            - configMapRef: {name: platform-config}
            - secretRef: {name: platform-secrets-placeholder}
---
apiVersion: v1
kind: Service
metadata:
  name: api-hub
  namespace: all-in-one
spec:
  selector: {app: api-hub}
  ports: [{port: 80, targetPort: 8000}]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: outbox-dispatcher
  namespace: all-in-one
spec:
  replicas: 2
  selector:
    matchLabels: {app: outbox-dispatcher}
  template:
    metadata:
      labels: {app: outbox-dispatcher}
    spec:
      containers:
        - name: outbox-dispatcher
          image: all-in-one/outbox-dispatcher:0.3.0
          envFrom:
            - configMapRef: {name: platform-config}
            - secretRef: {name: platform-secrets-placeholder}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: retention-worker
  namespace: all-in-one
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels: {app: retention-worker}
        spec:
          restartPolicy: OnFailure
          containers:
            - name: retention-worker
              image: all-in-one/retention-worker:0.1.0
              command: ["python", "-m", "workers.retention_worker.main"]
              args: ["--postgres", "--job", "retention_review_daily", "--dry-run"]
              envFrom:
                - configMapRef: {name: platform-config}
                - secretRef: {name: platform-secrets-placeholder}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-hub
  namespace: all-in-one
spec:
  scaleTargetRef: {apiVersion: apps/v1, kind: Deployment, name: api-hub}
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: {type: Utilization, averageUtilization: 70}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: platform
  namespace: all-in-one
spec:
  rules:
    - host: api.example.invalid
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service: {name: api-hub, port: {number: 80}}
