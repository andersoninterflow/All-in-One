name: Stitch Remote Sync

on:
  workflow_dispatch:
  push:
    branches: [main]
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write

concurrency:
  group: stitch-remote-sync-${{ github.ref }}
  cancel-in-progress: false

jobs:
  stitch-sync:
    runs-on: ubuntu-latest
    env:
      STITCH_REMOTE_SYNC_ENABLED: "true"
      STITCH_API_KEY: ${{ secrets.STITCH_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Stitch sync dependencies
        run: python -m pip install httpx

      - name: Validate policy and synchronize Stitch projects
        run: python scripts/stitch_auto_sync.py --dry-run

      - name: Commit synchronized Stitch state
        run: |
          git config user.name "all-in-one-bot"
          git config user.email "actions@users.noreply.github.com"
          git add config/stitch/screen_manifest.json config/stitch/sync_state.json
          git diff --cached --quiet || git commit -m "chore(stitch): synchronize remote design state"
          git push
