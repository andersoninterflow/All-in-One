apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: retention-worker
  name: retention-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: retention-worker
  template:
    metadata:
      labels:
        app: retention-worker
    spec:
      containers:
      - env:
        - name: ALL_IN_ONE_RETENTION_POSTGRES_DSN
          value: ${ALL_IN_ONE_RETENTION_POSTGRES_DSN:-postgresql://all_in_one:local-development-only@postgres:5432/all_in_one}
        - name: ALL_IN_ONE_RETENTION_BATCH_SIZE
          value: ${ALL_IN_ONE_RETENTION_BATCH_SIZE:-100}
        - name: ALL_IN_ONE_RETENTION_POLL_SECONDS
          value: ${ALL_IN_ONE_RETENTION_POLL_SECONDS:-3600}
        image: gcr.io/all-in-one-498012/retention-worker:latest
        name: retention-worker
