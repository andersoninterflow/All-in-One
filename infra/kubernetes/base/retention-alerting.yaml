apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: retention-worker-alerts
  namespace: all-in-one
  labels:
    app: retention-worker
    domain: compliance
    data-classification: sensitive
spec:
  groups:
    - name: all-in-one.retention-worker
      rules:
        - alert: RetentionCronJobFailed
          expr: increase(kube_job_status_failed{job_name=~"retention-worker.*"}[2h]) > 0
          for: 10m
          labels:
            severity: critical
            service: retention-worker
            domain: compliance
          annotations:
            summary: CronJob de retencao LGPD falhou no ultimo ciclo.
            runbook_url: docs/OPERATIONS.md#retencao-lgpd
            evidence: failed_job_name,pod_logs,retention_policy_version,incident_ticket
        - alert: RetentionCronJobDelayed
          expr: time() - max(kube_job_status_completion_time{job_name=~"retention-worker.*"}) > 7200
          for: 15m
          labels:
            severity: high
            service: retention-worker
            domain: compliance
          annotations:
            summary: CronJob de retencao LGPD nao conclui ha mais de duas janelas de execucao.
            runbook_url: docs/OPERATIONS.md#retencao-lgpd
            evidence: last_completion_timestamp,cronjob_status,scheduler_events,incident_ticket
        - alert: RetentionBacklogHigh
          expr: all_in_one_retention_candidates_pending > 500
          for: 30m
          labels:
            severity: high
            service: retention-worker
            domain: compliance
          annotations:
            summary: Backlog de candidatos de retencao pendentes acima do limite operacional.
            runbook_url: docs/OPERATIONS.md#retencao-lgpd
            evidence: pending_count,oldest_candidate_age_seconds,policy_version,incident_ticket
        - alert: RetentionOldestCandidateTooOld
          expr: all_in_one_retention_oldest_candidate_age_seconds > 86400
          for: 15m
          labels:
            severity: critical
            service: retention-worker
            domain: compliance
          annotations:
            summary: Candidato de retencao LGPD mais antigo excedeu 24 horas.
            runbook_url: docs/OPERATIONS.md#retencao-lgpd
            evidence: oldest_candidate_age_seconds,candidate_selector_hash,legal_hold_summary,incident_ticket
        - alert: RetentionDecisionMissing
          expr: all_in_one_retention_candidates_pending > 0 and increase(all_in_one_retention_decisions_total[2h]) == 0
          for: 30m
          labels:
            severity: medium
            service: retention-worker
            domain: compliance
          annotations:
            summary: Nao ha novas decisoes de retencao apesar de candidatos pendentes.
            runbook_url: docs/OPERATIONS.md#retencao-lgpd
            evidence: pending_count,decision_count_delta,worker_logs,incident_ticket
---
apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: retention-worker-routing
  namespace: all-in-one
  labels:
    app: retention-worker
    domain: compliance
spec:
  route:
    receiver: compliance-oncall
    groupBy: ["alertname", "service", "domain"]
    groupWait: 30s
    groupInterval: 5m
    repeatInterval: 2h
    matchers:
      - name: service
        value: retention-worker
        matchType: =
    routes:
      - receiver: platform-oncall
        matchers:
          - name: severity
            value: critical
            matchType: =
  receivers:
    - name: compliance-oncall
    - name: platform-oncall
