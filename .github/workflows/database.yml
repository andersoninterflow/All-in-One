name: Database

on:
  push:
    branches: [main]
    paths: ["database/**", ".github/workflows/database.yml"]
  pull_request:
    paths: ["database/**", ".github/workflows/database.yml"]

jobs:
  migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: all_in_one
          POSTGRES_USER: all_in_one
          POSTGRES_PASSWORD: test-password
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U all_in_one -d all_in_one"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      PGPASSWORD: test-password
    steps:
      - uses: actions/checkout@v4
      - name: Apply migrations
        run: |
          for file in database/postgres/migrations/*.sql; do
            psql -h localhost -U all_in_one -d all_in_one -v ON_ERROR_STOP=1 -f "$file"
          done
      - name: Confirm immutable triggers
        run: |
          psql -h localhost -U all_in_one -d all_in_one -c "SELECT tgname FROM pg_trigger WHERE tgname IN ('immutable_audit_logs','immutable_finance_ledger');"
