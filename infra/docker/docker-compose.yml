name: all-in-one

x-module-common: &module-common
  build:
    context: ../..
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy
    rabbitmq:
      condition: service_healthy
    migrations:
      condition: service_completed_successfully
  networks: [platform]
  environment:
    ALL_IN_ONE_STORAGE_DIR: /data
  volumes:
    - domain-data:/data
  healthcheck:
    test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()\""]
    interval: 10s
    timeout: 5s
    retries: 12
    start_period: 20s

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-all_in_one}
      POSTGRES_USER: ${POSTGRES_USER:-all_in_one}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local-development-only}
    ports: ["5432:5432"]
    volumes: [postgres-data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks: [platform]

  migrations:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-local-development-only}
    volumes:
      - ../../database/postgres/migrations:/migrations:ro
    command:
      - sh
      - -ec
      - |
        for file in /migrations/*.sql; do
          psql -h postgres -U "${POSTGRES_USER:-all_in_one}" -d "${POSTGRES_DB:-all_in_one}" -v ON_ERROR_STOP=1 -f "$$file"
        done
    networks: [platform]

  mongodb:
    image: mongo:7
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-all_in_one}
    ports: ["27017:27017"]
    volumes:
      - mongodb-data:/data/db
      - ../../database/mongodb/init:/docker-entrypoint-initdb.d:ro
    networks: [platform]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    networks: [platform]

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-all_in_one}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-local-development-only}
    ports: ["5672:5672", "15672:15672"]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks: [platform]

  api-hub:
    <<: *module-common
    build:
      context: ../..
      dockerfile: modules/api_hub/Dockerfile
    environment:
      ALL_IN_ONE_STORAGE_DIR: /data
      ALL_IN_ONE_API_HUB_POSTGRES_DSN: ${ALL_IN_ONE_API_HUB_POSTGRES_DSN:-postgresql://all_in_one:local-development-only@postgres:5432/all_in_one}
      ALL_IN_ONE_REDIS_URL: ${ALL_IN_ONE_REDIS_URL:-redis://redis:6379/0}
      IDENTITY_SERVICE_URL: ${IDENTITY_SERVICE_URL:-http://identity:8000}
      FINANCE_SERVICE_URL: ${FINANCE_SERVICE_URL:-http://finance:8000}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
      migrations:
        condition: service_completed_successfully
    ports: ["8100:8000"]

  identity:
    <<: *module-common
    build:
      context: ../..
      dockerfile: modules/identity/Dockerfile
    environment:
      ALL_IN_ONE_STORAGE_DIR: /data
      ALL_IN_ONE_IDENTITY_POSTGRES_DSN: ${ALL_IN_ONE_IDENTITY_POSTGRES_DSN:-postgresql://all_in_one:local-development-only@postgres:5432/all_in_one}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    ports: ["8101:8000"]

  finance:
    <<: *module-common
    build:
      context: ../..
      dockerfile: modules/finance/Dockerfile
    environment:
      ALL_IN_ONE_STORAGE_DIR: /data
      ALL_IN_ONE_FINANCE_POSTGRES_DSN: ${ALL_IN_ONE_FINANCE_POSTGRES_DSN:-postgresql://all_in_one:local-development-only@postgres:5432/all_in_one}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    ports: ["8102:8000"]

  marketplace:
    <<: *module-common
    build:
      context: ../..
      dockerfile: modules/marketplace/Dockerfile
    environment:
      ALL_IN_ONE_STORAGE_DIR: /data
      ALL_IN_ONE_MARKETPLACE_POSTGRES_DSN: ${ALL_IN_ONE_MARKETPLACE_POSTGRES_DSN:-postgresql://all_in_one:local-development-only@postgres:5432/all_in_one}
    ports: ["8103:8000"]

  delivery:
    <<: *module-common
    build:
      context: ../..
      dockerfile: modules/delivery/Dockerfile
    environment:
      ALL_IN_ONE_STORAGE_DIR: /data
      ALL_IN_ONE_DELIVERY_POSTGRES_DSN: ${ALL_IN_ONE_DELIVERY_POSTGRES_DSN:-postgresql://all_in_one:local-development-only@postgres:5432/all_in_one}
    ports: ["8104:8000"]

  services:
    <<: *module-common
    build:
      context: ../..
      dockerfile: modules/services/Dockerfile
    environment:
      ALL_IN_ONE_STORAGE_DIR: /data
      ALL_IN_ONE_SERVICES_POSTGRES_DSN: ${ALL_IN_ONE_SERVICES_POSTGRES_DSN:-postgresql://all_in_one:local-development-only@postgres:5432/all_in_one}
    ports: ["8105:8000"]

  mobility:
    <<: *module-common
    build:
      context: ../..
      dockerfile: modules/mobility/Dockerfile
    environment:
      ALL_IN_ONE_STORAGE_DIR: /data
      ALL_IN_ONE_MOBILITY_POSTGRES_DSN: ${ALL_IN_ONE_MOBILITY_POSTGRES_DSN:-postgresql://all_in_one:local-development-only@postgres:5432/all_in_one}
    ports: ["8106:8000"]

  erp:
    <<: *module-common
    build:
      context: ../..
      dockerfile: modules/erp/Dockerfile
    environment:
      ALL_IN_ONE_STORAGE_DIR: /data
      ALL_IN_ONE_ERP_POSTGRES_DSN: ${ALL_IN_ONE_ERP_POSTGRES_DSN:-postgresql://all_in_one:local-development-only@postgres:5432/all_in_one}
    ports: ["8107:8000"]

  wms:
    <<: *module-common
    build:
      context: ../..
      dockerfile: modules/wms/Dockerfile
    environment:
      ALL_IN_ONE_STORAGE_DIR: /data
      ALL_IN_ONE_WMS_POSTGRES_DSN: ${ALL_IN_ONE_WMS_POSTGRES_DSN:-postgresql://all_in_one:local-development-only@postgres:5432/all_in_one}
    ports: ["8108:8000"]

  tms:
    <<: *module-common
    build:
      context: ../..
      dockerfile: modules/tms/Dockerfile
    environment:
      ALL_IN_ONE_STORAGE_DIR: /data
      ALL_IN_ONE_TMS_POSTGRES_DSN: ${ALL_IN_ONE_TMS_POSTGRES_DSN:-postgresql://all_in_one:local-development-only@postgres:5432/all_in_one}
    ports: ["8109:8000"]

  crm:
    <<: *module-common
    build:
      context: ../..
      dockerfile: modules/crm/Dockerfile
    environment:
      ALL_IN_ONE_STORAGE_DIR: /data
      ALL_IN_ONE_CRM_POSTGRES_DSN: ${ALL_IN_ONE_CRM_POSTGRES_DSN:-postgresql://all_in_one:local-development-only@postgres:5432/all_in_one}
    ports: ["8110:8000"]

  health:
    <<: *module-common
    build:
      context: ../..
      dockerfile: modules/health/Dockerfile
    environment:
      ALL_IN_ONE_STORAGE_DIR: /data
      ALL_IN_ONE_HEALTH_POSTGRES_DSN: ${ALL_IN_ONE_HEALTH_POSTGRES_DSN:-postgresql://all_in_one:local-development-only@postgres:5432/all_in_one}
    ports: ["8111:8000"]

  jobs:
    <<: *module-common
    build:
      context: ../..
      dockerfile: modules/jobs/Dockerfile
    environment:
      ALL_IN_ONE_STORAGE_DIR: /data
      ALL_IN_ONE_PRIVATE_DOCUMENT_DIR: /private-documents
      ALL_IN_ONE_DOCUMENT_ENCRYPTION_KEY: ${ALL_IN_ONE_DOCUMENT_ENCRYPTION_KEY:-}
      ALL_IN_ONE_JOBS_POSTGRES_DSN: ${ALL_IN_ONE_JOBS_POSTGRES_DSN:-postgresql://all_in_one:local-development-only@postgres:5432/all_in_one}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    volumes:
      - domain-data:/data
      - private-document-data:/private-documents
    ports: ["8112:8000"]

  outbox-dispatcher:
    build:
      context: ../..
      dockerfile: workers/outbox_dispatcher/Dockerfile
    restart: unless-stopped
    depends_on:
      migrations:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    environment:
      ALL_IN_ONE_OUTBOX_POSTGRES_DSN: ${ALL_IN_ONE_OUTBOX_POSTGRES_DSN:-postgresql://all_in_one:local-development-only@postgres:5432/all_in_one}
      ALL_IN_ONE_RABBITMQ_URL: ${ALL_IN_ONE_RABBITMQ_URL:-amqp://all_in_one:local-development-only@rabbitmq:5672/%2F}
      ALL_IN_ONE_OUTBOX_EXCHANGE: ${ALL_IN_ONE_OUTBOX_EXCHANGE:-all-in-one.domain}
      ALL_IN_ONE_OUTBOX_BATCH_SIZE: ${ALL_IN_ONE_OUTBOX_BATCH_SIZE:-100}
      ALL_IN_ONE_OUTBOX_POLL_SECONDS: ${ALL_IN_ONE_OUTBOX_POLL_SECONDS:-1}
    networks: [platform]

  retention-worker:
    build:
      context: ../..
      dockerfile: workers/retention_worker/Dockerfile
    restart: unless-stopped
    depends_on:
      migrations:
        condition: service_completed_successfully
    environment:
      ALL_IN_ONE_RETENTION_POSTGRES_DSN: ${ALL_IN_ONE_RETENTION_POSTGRES_DSN:-postgresql://all_in_one:local-development-only@postgres:5432/all_in_one}
      ALL_IN_ONE_RETENTION_BATCH_SIZE: ${ALL_IN_ONE_RETENTION_BATCH_SIZE:-100}
      ALL_IN_ONE_RETENTION_POLL_SECONDS: ${ALL_IN_ONE_RETENTION_POLL_SECONDS:-3600}
    command:
      - sh
      - -ec
      - |
        while true; do
          python -m workers.retention_worker.main --postgres --job retention_review_daily --dry-run
          python -m workers.retention_worker.main --postgres --job anonymization_worker_hourly --dry-run
          python -m workers.retention_worker.main --postgres --job deletion_worker_daily --dry-run
          python -m workers.retention_worker.main --postgres --job legal_hold_reconciliation_daily
          sleep "${ALL_IN_ONE_RETENTION_POLL_SECONDS:-3600}"
        done
    networks: [platform]

volumes:
  postgres-data:
  mongodb-data:
  domain-data:
  private-document-data:

networks:
  platform:
