name: Continuous Integration

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests pytest pytest-cov

      - name: Cleanup artifacts
        run: python scripts/cleanup_artifacts.py

      - name: Run Unit Tests
        run: pytest --cov=scripts --cov-report=html --cov-report=term-missing --cov-fail-under=80 tests/

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-coverage-report
          path: htmlcov/
          retention-days: 7
