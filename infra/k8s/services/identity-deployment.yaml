apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: identity
  name: identity
spec:
  replicas: 2
  selector:
    matchLabels:
      app: identity
  template:
    metadata:
      labels:
        app: identity
    spec:
      containers:
      - env:
        - name: ALL_IN_ONE_STORAGE_DIR
          value: /data
        - name: ALL_IN_ONE_IDENTITY_POSTGRES_DSN
          value: ${ALL_IN_ONE_IDENTITY_POSTGRES_DSN:-postgresql://all_in_one:local-development-only@postgres:5432/all_in_one}
        image: gcr.io/all-in-one-498012/identity:latest
        name: identity
        ports:
        - containerPort: 8000
